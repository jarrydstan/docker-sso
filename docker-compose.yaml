networks:
  backend:
    # external: true
    name: backend
    enable_ipv6: true
    driver: bridge
    ipam:
      config:
        - subnet: $BACKEND_IPV6
        - subnet: $BACKEND_IPV4
  frontend:
    # external: true
    name: frontend
    enable_ipv6: true
    driver: bridge
    ipam:
      config:
        - subnet: $FRONTEND_IPV6
        - subnet: $FRONTEND_IPV4
  socket_proxy:
    name: socket_proxy
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: $SOCKET_PROXY_IPV6
        - subnet: $SOCKET_PROXY_IPV4
services:
  socket-proxy:
    container_name: socket-proxy
    image: tecnativa/docker-socket-proxy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    # profiles: ["core", "all"]
    networks:
      socket_proxy:
        ipv4_address: $SOCKET_PROXY_IP # You can specify a static IP
    privileged: true # true for VM. False for unprivileged LXC container.
    ports:
      - "2375:2375"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    environment:
      - LOG_LEVEL=info
      - EVENTS=1
      - PING=1
      - VERSION=1
      - AUTH=0
      - SECRETS=0
      - POST=1
      - BUILD=0
      - COMMIT=0
      - CONFIGS=0
      - CONTAINERS=1
      - DISTRIBUTION=0
      - EXEC=0
      - IMAGES=1
      - INFO=1
      - NETWORKS=1
      - NODES=0
      - PLUGINS=0
      - SERVICES=1
      - SESSION=0
      - SWARM=0
      - SYSTEM=1
      - TASKS=1
      - VOLUMES=1
  postgresql:
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${PG_DB}
      - POSTGRES_PASSWORD=${PG_PASS}
      - POSTGRES_USER=${PG_USER}
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 20s
      test:
        - CMD-SHELL
        - pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
      timeout: 5s
    image: docker.io/library/postgres:16-alpine
    container_name: authentik-pg
    networks:
      - backend
    restart: unless-stopped
    volumes:
      - database:/var/lib/postgresql/data
  server:
    command: server
    depends_on:
      postgresql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - AUTHENTIK_POSTGRESQL__HOST=postgresql
      - AUTHENTIK_POSTGRESQL__NAME=${PG_DB}
      - AUTHENTIK_POSTGRESQL__PASSWORD=${PG_PASS}
      - AUTHENTIK_POSTGRESQL__USER=${PG_USER}
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
      - AUTHENTIK_ERROR_REPORTING__ENABLED=true
      - AUTHENTIK_COOKIE_DOMAIN=$AUTHENTIK_COOKIE_DOMAIN
      - AUTHENTIK_LOG_LEVEL=info
    networks:
      frontend:
        ipv4_address: $AUTHENTIK_IP1
      backend:
        ipv4_address: $AUTHENTIK_IP2
      socket_proxy:
        ipv4_address: $AUTHENTIK_IP3
    ports:
      - "9000:9000"
      - "9443:9443"
    restart: unless-stopped
    volumes:
      - ./certs/live/$ROOT_DOMAIN:/certs/$ROOT_DOMAIN
      - ./media:/media
      - ./custom-templates:/templates
      - ./css/custom.css:/web/dist/custom.css
      # - ./email/:/authentik/stages/email/templates/email/
      - ./images/logo-banner.png:/web/icons/icon_left_brand.png
      # - ./email/base.html:/authentik/stages/email/templates/email/base.html
      - ./current_email/:/authentik/stages/email/templates/email/
      # - ./current_email/:/authentik/stages/email/templates/email/
    image: ghcr.io/goauthentik/server:2025.10
    container_name: authentik-sv
  worker:
    command: worker
    depends_on:
      postgresql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - AUTHENTIK_POSTGRESQL__HOST=postgresql
      - AUTHENTIK_POSTGRESQL__NAME=${PG_DB}
      - AUTHENTIK_POSTGRESQL__PASSWORD=${PG_PASS}
      - AUTHENTIK_POSTGRESQL__USER=${PG_USER}
      - AUTHENTIK_ERROR_REPORTING__ENABLED=true
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
    image: ghcr.io/goauthentik/server:2025.10
    restart: unless-stopped
    user: root
    volumes:
      - ./media:/media
      - ./certs/live/$ROOT_DOMAIN:/certs/$ROOT_DOMAIN
      - ./certs/archive/$ROOT_DOMAIN:/archive/$ROOT_DOMAIN
      - ./custom-templates:/templates
      - ./css/custom.css:/web/dist/custom.css
      - ./images/logo-banner.png:/web/icons/icon_left_brand.png
      - ./email/base.html:/authentik/stages/email/templates/email/base.html
    container_name: authentik-work
    networks:
      - backend
      - socket_proxy
  deunhealth:
    security_opt:
      - no-new-privileges:true
    image: qmcgaw/deunhealth
    container_name: deunhealth
    network_mode: "none"
    environment:
      - LOG_LEVEL=info
      - HEALTH_SERVER_ADDRESS=127.0.0.1:9999
      - TZ=$TZ
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
volumes:
  database:
    driver: local
  redis:
    driver: local
